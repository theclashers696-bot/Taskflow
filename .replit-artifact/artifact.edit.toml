kind = "web"
  previewPath = "/"
  title = "TaskFlow"
  version = "1.0.0"
  id = "artifacts/taskflow"
  router = "path"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 21998

  [services.development]
  run = "pnpm --filter @workspace/taskflow run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/taskflow", "run", "build" ]
  run = "pnpm --filter @workspace/taskflow run start"

  [services.env]
  PORT = "21998"
  